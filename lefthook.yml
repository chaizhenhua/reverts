pre-commit:
  parallel: false
  commands:
    check-root-md-files:
      run: |
        ALLOWED_ROOT_MD="README.md|AGENTS.md|CHANGELOG.md|CONTRIBUTING.md|LICENSE.md"
        root_md_files=$(git diff --cached --name-only --diff-filter=A | grep -E '^[^/]+\.md$' | grep -vE "^($ALLOWED_ROOT_MD)$" || true)
        if [ -n "$root_md_files" ]; then
          echo "ERROR: root markdown files must be canonical project files or live under docs/:"
          echo "$root_md_files"
          exit 1
        fi
      stage_fixed: false

    check-secrets:
      run: |
        sensitive=$(git diff --cached --diff-filter=AM -- . ':(exclude)lefthook.yml' | grep "^+" | grep -v "^+++" | grep -iE "(api[_-]?key|password|secret[_-]?key|access[_-]?token).*(=|:).*(sk-|pk-|['\"][A-Za-z0-9]{32,}['\"])" || true)
        if [ -n "$sensitive" ]; then
          echo "ERROR: possible hard-coded secret detected:"
          echo "$sensitive"
          exit 1
        fi
      stage_fixed: false

    rustfmt:
      glob: "**/*.rs"
      run: rustfmt --edition 2024 {staged_files}
      stage_fixed: true

    cargo-check:
      run: cargo check --workspace --locked
      stage_fixed: false

commit-msg:
  commands:
    validate-message:
      run: |
        MSG_FILE="{1}"
        if [ ! -f "$MSG_FILE" ]; then
          echo "ERROR: commit message file not found: $MSG_FILE"
          exit 1
        fi

        first_line="$(sed -n '1p' "$MSG_FILE" | tr -d '\r')"
        line_count="$(wc -l < "$MSG_FILE" | tr -d ' ')"

        if [ "$line_count" -gt 1 ]; then
          echo "ERROR: commit messages must be exactly one line."
          exit 1
        fi

        if [ "${#first_line}" -gt 100 ]; then
          echo "ERROR: commit subject exceeds 100 characters."
          exit 1
        fi

        if ! printf '%s\n' "$first_line" | grep -Eq '^[^[:space:]]+ [a-z]+\([a-z0-9-]+\): .+'; then
          echo "ERROR: commit subject must match '<emoji> <type>(<scope>): <subject>'."
          echo "Example: ✨ feat(ir): add module graph primitives"
          exit 1
        fi

        if grep -iq "Co-Authored-By:" "$MSG_FILE"; then
          echo "ERROR: commit message contains Co-Authored-By."
          exit 1
        fi

        if grep -iE "(Generated (with|by))|(🤖.*Generated)" "$MSG_FILE" >/dev/null 2>&1; then
          echo "ERROR: commit message contains AI generation markers."
          exit 1
        fi

        if grep -Ei "(^via \[[^]]+\]\(https?://[^)]+\)$)|(^via https?://)|(^Tool: [A-Za-z0-9._-]+$)|(^Platform: [A-Za-z0-9._-]+$)" "$MSG_FILE" >/dev/null 2>&1; then
          echo "ERROR: commit message contains external tool provenance markers."
          exit 1
        fi

pre-push:
  commands:
    validate:
      run: cargo clippy --workspace --locked --all-targets -- -D warnings && cargo test --workspace --locked

post-rewrite:
  commands:
    validate-rebase-commits:
      run: |
        rewrite_type="{1}"
        if [ "$rewrite_type" != "rebase" ]; then
          exit 0
        fi

        invalid_commits=""
        if read -t 1 -r _old_sha new_sha _rest 2>/dev/null; then
          while true; do
            msg=$(git log -1 --format=%s "$new_sha" 2>/dev/null || echo "")
            if [ -n "$msg" ] && ! printf '%s\n' "$msg" | grep -Eq '^[^[:space:]]+ [a-z]+\([a-z0-9-]+\): .+'; then
              invalid_commits="${invalid_commits}  ${new_sha}: ${msg}\n"
            fi
            read -t 1 -r _old_sha new_sha _rest 2>/dev/null || break
          done
        fi

        if [ -n "$invalid_commits" ]; then
          echo "ERROR: rebased commits have invalid messages:"
          printf '%b' "$invalid_commits"
          exit 1
        fi
