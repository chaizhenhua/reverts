name: release

# Build pre-compiled `reverts-cli` binaries for each supported platform and
# publish them, together with the skill bundle, as GitHub Release assets. The
# `install.sh` script at the repo root downloads these assets — there is no
# `reverts-mcp` server in the distribution.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)build release assets for"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: 3
  RUST_BACKTRACE: 1

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      # The toolchain pin in rust-toolchain.toml is honoured automatically; we
      # only add the matrix target on top of it.
      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.target }}-cargo-

      - name: Build reverts-cli
        run: cargo build --release --locked --bin reverts-cli --target ${{ matrix.target }}

      # The tarball contains the binary and the full skill bundle so that
      # install.sh can lay down both in one download. Layout inside the
      # archive: `bin/reverts-cli` and `skills/<skill>/...`.
      - name: Package
        id: package
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          stage="reverts-${{ matrix.target }}"
          mkdir -p "$stage/bin"
          cp "target/${{ matrix.target }}/release/reverts-cli" "$stage/bin/reverts-cli"
          cp -R skills "$stage/skills"
          cp README.md "$stage/README.md"
          tarball="${stage}.tar.gz"
          tar -czf "$tarball" "$stage"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$tarball" > "${tarball}.sha256"
          else
            shasum -a 256 "$tarball" > "${tarball}.sha256"
          fi
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: reverts-${{ matrix.target }}
          path: |
            reverts-${{ matrix.target }}.tar.gz
            reverts-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
